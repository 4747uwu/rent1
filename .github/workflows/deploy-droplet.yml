name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to droplet
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DROPLET_HOST }}
        username: ${{ secrets.DROPLET_USER }}
        password: ${{ secrets.DROPLET_PASSWORD }}
        script: |
          if ! command -v docker &> /dev/null; then
            echo "🔧 Installing Docker..."
            apt update
            apt install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            apt update
            apt install -y docker-ce docker-ce-cli containerd.io
            systemctl start docker
            systemctl enable docker
            echo "✅ Docker installed"
          else
            echo "✅ Docker already present"
          fi

          mkdir -p /mnt/volume_blr1_03/medical-project-rent
          cd /mnt/volume_blr1_03/medical-project-rent

          rm -rf rent1
          git clone https://github.com/4747uwu/rent1.git
          cd rent1

          cat > .env << 'ENVEOF'
          NODE_ENV=production
          MONGODB_URI=mongodb://admin:StrongPass123!@mongorent:27017/?replicaSet=rs0&authSource=admin
          REDIS_URL=rediss://default:ATDmAAIjcDFlY2U3MzZmZjIxNDQ0YmZmYmY0NmVlZTBhMjgwOTkyYnAxMA@just-pug-12518.upstash.io:6379
          JWT_SECRET=your_jwt_secret_for_day_2_auth
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=pawrangerskyler@gmail.com
          SMTP_PASS=cnuw_zttj_vzsx_dbxh
          SENDER_EMAIL=pawrangerskyler@gmail.com
          WASABI_ACCESS_KEY=EMJYIRHNX3687Z1HDF9R
          WASABI_SECRET_KEY=n2ZP0zoTSCOmQ5vo20zteAQGcg9XNjO7br4idAOe
          WASABI_REGION=ap-southeast-1
          WASABI_ENDPOINT=https://s3.ap-southeast-1.wasabisys.com
          WASABI_DICOM_BUCKET=diacom
          WASABI_DOCUMENTS_BUCKET=medicaldocuments
          WASABI_REPORTS_BUCKET=diacomreports
          WASABI_BACKUPS_BUCKET=medical-backups
          ENVEOF

          mkdir -p /tmp/node/restore

          echo "=== Gentle cleanup ==="
          docker compose -p medical-rent -f docker-compose.prod.yml stop backend frontend 2>/dev/null || true
          docker compose -p medical-rent -f docker-compose.prod.yml rm -f backend frontend 2>/dev/null || true

          echo "=== Building backend and frontend ==="
          if ! docker compose -p medical-rent -f docker-compose.prod.yml build --no-cache backend frontend; then
            echo "❌ Build failed!"
            docker compose -p medical-rent -f docker-compose.prod.yml logs backend frontend
            exit 1
          fi

          echo "=== Starting backend and frontend ==="
          if ! docker compose -p medical-rent -f docker-compose.prod.yml up -d backend frontend; then
            echo "❌ Startup failed!"
            docker compose -p medical-rent -f docker-compose.prod.yml logs backend frontend
            exit 1
          fi

          sleep 15

          echo "=== All Running Containers ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

          echo "=== Medical Rent Project Status ==="
          docker compose -p medical-rent -f docker-compose.prod.yml ps backend frontend

          echo "=== Recent Logs ==="
          docker compose -p medical-rent -f docker-compose.prod.yml logs --tail=50 backend frontend

          docker image prune -f
          echo "✅ Deployment complete!"
